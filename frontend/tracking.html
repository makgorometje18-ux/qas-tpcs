<!DOCTYPE html>
<html>
<head>
<title>Track Parcel</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1f2937;
  --accent:#22c55e;
  --text:white;
}

.light{
  --bg:#f4f6f9;
  --card:white;
  --text:#111;
}

body{
  font-family:Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

/* TOP BUTTONS */
.back{
  position:fixed;
  left:15px;
  top:15px;
  background:#555;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  text-decoration:none;
}

.toggle{
  position:fixed;
  right:15px;
  top:15px;
  background:#007bff;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

h1{
  margin-top:60px;
}

.search-box{
  margin-top:20px;
}

input{
  padding:14px;
  width:260px;
  border-radius:12px;
  border:none;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.ref-box{
  max-width:500px;
  margin:25px auto 10px;
  background:var(--card);
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  text-align:left;
}

/* TIMELINE */
.timeline{
  max-width:500px;
  margin:20px auto 30px;
  text-align:left;
}

.step{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border-left:6px solid var(--accent);
}

.status{
  font-weight:bold;
  font-size:18px;
}

.loc{
  opacity:.9;
  margin-top:6px;
}

.date{
  opacity:.7;
  font-size:14px;
  margin-top:6px;
}

.delivered{
  background:#22c55e;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  margin-top:20px;
}

.error{
  margin-top:25px;
  font-weight:bold;
}
</style>
</head>

<body>

<a href="/dashboard" class="back">⬅ Dashboard</a>
<div class="toggle" onclick="toggle()">🌗 Toggle</div>

<h1>📦 Track Parcel</h1>

<div class="search-box">
  <input id="code" placeholder="Enter tracking number">
  <button onclick="track()">Track</button>
</div>

<div id="referenceBox"></div>
<div id="result" class="timeline"></div>

<script>
function toggle(){
  document.body.classList.toggle("light");
}

function formatDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(isNaN(d)) return value;
  return d.toLocaleString("en-ZA");
}

async function track(){
  const code = document.getElementById("code").value.trim();
  const box = document.getElementById("result");
  const refBox = document.getElementById("referenceBox");

  refBox.innerHTML = "";
  box.innerHTML = "";

  if(!code) return;

  try{
    const res = await fetch("/track/" + encodeURIComponent(code));
    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){
      box.innerHTML = "<div class='error'>No tracking found</div>";
      return;
    }

    refBox.innerHTML = `
      <div class="ref-box">
        Reference Number: ${code}
      </div>
    `;

    let delivered = false;

    data.forEach(step => {
      if(String(step.status).toLowerCase() === "delivered"){
        delivered = true;
      }

      box.innerHTML += `
        <div class="step">
          <div class="status">${step.status || ""}</div>
          <div class="loc">📍 ${step.location || ""}</div>
          <div class="date">🕒 ${formatDate(step.created_at)}</div>
        </div>
      `;
    });

    if(delivered){
      box.innerHTML += `
        <div class="delivered">
          ✅ Parcel Delivered
        </div>
      `;
    }
  }catch(err){
    console.error(err);
    box.innerHTML = "<div class='error'>Error loading tracking</div>";
  }
}
</script>

</body>
</html>
