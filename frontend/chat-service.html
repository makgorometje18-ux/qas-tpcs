<!DOCTYPE html>
<html>
<head>
<title>Support Chat</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ===== DARK/LIGHT MODE ===== */
:root{
  --bg:#0f172a;
  --text:white;
  --me:#22c55e;
  --other:#1f2937;
  --input:#111827;
  --accent:#3b82f6;
}

.light{
  --bg:#f4f6f9;
  --text:#111;
  --me:#dcf8c6;
  --other:white;
  --input:#e5e7eb;
  --accent:#007bff;
}

body{
  font-family:Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* ===== POD STYLE BUTTONS ===== */
.back{
  position:fixed;
  top:15px;
  left:15px;
  background:#555;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  text-decoration:none;
}

.toggle{
  position:fixed;
  top:15px;
  right:15px;
  background:var(--accent);
  color:white;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

h3{
  text-align:center;
  margin-top:60px;
}

/* ===== CHAT ===== */
#messages{
  padding:10px;
  height:65vh;
  overflow-y:auto;
}

.msg{
  padding:10px 14px;
  margin:6px;
  border-radius:15px;
  max-width:65%;
  clear:both;
  color:black;
  position:relative;
  font-size:14px;
}

.time{
  display:block;
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
}

.me{
  background:var(--me);
  margin-left:auto;
}

.other{
  background:var(--other);
  margin-right:auto;
}

/* 🤖 BOT STYLE */
.bot{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:white;
  font-weight:bold;
  border-left:5px solid #22c55e;
  box-shadow:0 0 10px rgba(37,99,235,0.6);
  margin-right:auto;
}

/* Typing indicator */
.typing{
  font-style:italic;
  opacity:0.8;
}

/* ===== INPUT ===== */
.input-area{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--input);
  padding:10px;
  display:flex;
}

#msg{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

button{
  margin-left:10px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#007bff;
  color:white;
  cursor:pointer;
}

audio{
  width:220px;
}

</style>
</head>

<body>

<a href="/dashboard" class="back">⬅ Dashboard</a>
<div class="toggle" onclick="toggleMode()">🌗 Toggle</div>

<h3>🧑‍💼 Support Chat</h3>

<div id="messages"></div>

<div class="input-area">
  <input id="msg" placeholder="Type message...">
  <button onclick="send()">Send</button>
  <button id="recBtn" onclick="toggleRec()">🎤</button>
</div>

<script>

/* ===== MODE TOGGLE ===== */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* ===== SOCKET ===== */
const socket = io();
const username = "User";
let typingDiv=null;

/* ===== TIME FORMAT ===== */
function getTime(){
  const d=new Date();
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* SEND */
function send(){
  const input=document.getElementById("msg");
  const text=input.value.trim();
  if(!text) return;

  socket.emit("support-message",{
    user:username,
    message:text
  });

  add("me",username+": "+text);

  showTyping(); // 👈 typing indicator

  input.value="";
}

/* RECEIVE */
socket.on("support-message",data=>{

  hideTyping();

  // 🚫 Ignore own messages from server
  if(data.user === username) return;

  let type="other";

  if(data.user.includes("Bot")){
    type="bot";
  }

  add(type, data.user + ": " + data.message);
});

/* ADD MESSAGE */
function add(type,text){

  const d=document.createElement("div");
  d.className="msg "+type;

  d.innerHTML=text + 
    `<span class="time">${getTime()}</span>`;

  const box=document.getElementById("messages");
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

/* ===== TYPING INDICATOR ===== */
function showTyping(){

  if(typingDiv) return;

  typingDiv=document.createElement("div");
  typingDiv.className="msg bot typing";
  typingDiv.innerText="Support Bot is typing...";

  messages.appendChild(typingDiv);
  messages.scrollTop=messages.scrollHeight;
}

function hideTyping(){
  if(typingDiv){
    typingDiv.remove();
    typingDiv=null;
  }
}

/* ===== VOICE ===== */
let mediaRecorder;
let chunks=[];
let recording=false;

async function toggleRec(){

  if(!recording){

    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);

    chunks=[];

    mediaRecorder.ondataavailable=e=>{
      if(e.data.size>0) chunks.push(e.data);
    };

    mediaRecorder.onstop=()=>{
      const blob=new Blob(chunks);
      const url=URL.createObjectURL(blob);
      addVoice(url);
    };

    mediaRecorder.start();
    recording=true;
    recBtn.innerText="⏹";

  } else {
    mediaRecorder.stop();
    recording=false;
    recBtn.innerText="🎤";
  }
}

function addVoice(url){
  const wrap=document.createElement("div");
  wrap.className="msg me";

  const audio=document.createElement("audio");
  audio.src=url;
  audio.controls=true;

  wrap.appendChild(audio);

  const box=document.getElementById("messages");
  box.appendChild(wrap);
  box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
